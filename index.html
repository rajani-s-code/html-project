<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
</head>
<body>
    <center><h1>Profile Registration Form</h1></center>
    <hr>
    <form action="post">
        <h2>Personal Information</h2>
    
    
        <label for="firstname"> First name:</label>
        <input
          type="text"
          id="first"
          name="firstname"
          placeholder="enter first name "/>
          <br><br>
      
        <label for="lastname">Last name:</label>
        <input
          type="text"
          id="lastname"
          name="lastname"
          placeholder="enter last name "/>
          <br><br>

        <label >Age:</label>
        <input
          type="number"
          placeholder="Age "/>
      <br><br>
        <label for="Gender">Gender</label>
        <select name="Gender" id="Gender">
         
           <option value="">-- Choose Gender --</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Others">Others</option>
        </select>
      
    <br><br>
    <label>Select State:</label>
    <select name="state">
        <option value="">-- Choose State --</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
        <option value="Assam">Assam</option>
        <option value="Bihar">Bihar</option>
        <option value="Chhattisgarh">Chhattisgarh</option>
        <option value="Goa">Goa</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Haryana">Haryana</option>
        <option value="Himachal Pradesh">Himachal Pradesh</option>
        <option value="Jharkhand">Jharkhand</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Kerala">Kerala</option>
        <option value="Madhya Pradesh">Madhya Pradesh</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Manipur">Manipur</option>
        <option value="Meghalaya">Meghalaya</option>
        <option value="Mizoram">Mizoram</option>
        <option value="Nagaland">Nagaland</option>
        <option value="Odisha">Odisha</option>
        <option value="Punjab">Punjab</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Sikkim">Sikkim</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Telangana">Telangana</option>
        <option value="Tripura">Tripura</option>
        <option value="Uttar Pradesh">Uttar Pradesh</option>
        <option value="Uttarakhand">Uttarakhand</option>
        <option value="West Bengal">West Bengal</option>
        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
        <option value="Chandigarh">Chandigarh</option>
        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
        <option value="Delhi">Delhi</option>
        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
        <option value="Ladakh">Ladakh</option>
        <option value="Lakshadweep">Lakshadweep</option>
        <option value="Puducherry">Puducherry</option>
    </select>
<br><br>
        <label for="Contact">Contact:</label>
        <input
          type="number"
          id="Contact"
          name="Contact"
          placeholder="Contact "/>
<br><br>
        <label for="father">Father's Name:</label>
        <input
          type="text"
          id="father"
          name="fathername"
          placeholder="fathers Name "/>
<br><br>
        <label for="mother">Mother's Name:</label>
        <input
          type="text"
          id="mother"
          name="Mothername"
          placeholder="Mothers Name"/>
<br><br>
    <label for="address">Address:</label>
<br>
    <textarea 
        id="address" 
        name="address" 
        rows="3" 
        cols="60" 
        placeholder="Enter your full address"></textarea>
<br /><br />
<hr>
<h2>Professional Information</h2>
<label>Occupation Status:</label>
        <select>
             <option value="choose">--Choose Occupation--</option>
            <option value="student">Student</option>
            <option value="professional">Professional</option>
            <option value="other">Other / NIL</option>
        </select>
        <br><br>

        <label>College/Company Name:</label>
        <input type="text" placeholder="If applicable"><br><br>

        <label>Degree / Class / Role:</label>
        <input type="text" placeholder="If applicable"><br><br>

        <hr>

        <button type="submit">Submit Profile</button>
    </form>
</body>
</html>
